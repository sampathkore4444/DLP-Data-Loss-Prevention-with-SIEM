version: '3.8'

services:
  # Backend API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://securevault:securevault@db:5432/securevault
      - REDIS_URL=redis://cache:6379/0
      - OPENSEARCH_URL=http://opensearch:9200
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=securevault
      - MINIO_SECRET_KEY=securevault123
      - SECRET_KEY=your-secret-key-change-in-production
    depends_on:
      - db
      - cache
      - opensearch
      - minio
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # PostgreSQL Database
  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=securevault
      - POSTGRES_PASSWORD=securevault
      - POSTGRES_DB=securevault
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis Cache
  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # OpenSearch (Hot Storage)
  opensearch:
    image: opensearchproject/opensearch:2.12.0
    environment:
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=Admin123!
      - plugins.security.disabled=false
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -k -u admin:Admin123! https://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # MinIO (Cold Storage)
  minio:
    image: minio/minio:latest
    environment:
      - MINIO_ROOT_USER=securevault
      - MINIO_ROOT_PASSWORD=securevault123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm start

  # Background Services (Detection Engine, Correlation, etc.)
  services:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://securevault:securevault@db:5432/securevault
      - REDIS_URL=redis://cache:6379/0
      - OPENSEARCH_URL=http://opensearch:9200
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=securevault
      - MINIO_SECRET_KEY=securevault123
      - SECRET_KEY=your-secret-key-change-in-production
    depends_on:
      - db
      - cache
      - opensearch
      - minio
    volumes:
      - ./backend:/app
    command: python run_services.py

  # Syslog Simulator (for testing)
  syslog-simulator:
    image: alpine:latest
    command: sh -c "apk add --no-cache curl && while true; do curl -X POST http://api:8000/api/syslog?message='Failed password for invalid user admin from 192.168.1.100' 2>/dev/null; sleep 5; done"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  opensearch_data:
  minio_data:
